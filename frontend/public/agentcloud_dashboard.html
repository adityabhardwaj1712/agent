
<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{padding:1rem 0}
.top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:1.25rem}
.top h2{font-size:18px;font-weight:500;color:var(--color-text-primary)}
.top p{font-size:13px;color:var(--color-text-secondary);margin-top:3px}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem}
.fb{padding:4px 13px;border-radius:20px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-secondary);font-size:12px;cursor:pointer;font-family:var(--font-sans);transition:all .15s}
.fb.on{background:var(--color-background-info);color:var(--color-text-info);border-color:var(--color-border-info)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;cursor:pointer;transition:border-color .15s}
.card:hover{border-color:var(--color-border-primary)}
.card.top-pick{border:2px solid var(--color-border-info)}
.ch{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px}
.av{width:38px;height:38px;border-radius:var(--border-radius-md);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.av-p{background:var(--color-background-info)}
.av-g{background:var(--color-background-success)}
.av-w{background:var(--color-background-warning)}
.av-d{background:var(--color-background-danger)}
.av-n{background:var(--color-background-secondary)}
.badges{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500;white-space:nowrap}
.b-new{background:var(--color-background-info);color:var(--color-text-info)}
.b-pow{background:var(--color-background-danger);color:var(--color-text-danger)}
.b-free{background:var(--color-background-success);color:var(--color-text-success)}
.b-ent{background:var(--color-background-warning);color:var(--color-text-warning)}
.ct{font-size:14px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px}
.cs{font-size:12px;color:var(--color-text-secondary);line-height:1.5;margin-bottom:10px}
.meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tag{font-size:11px;padding:2px 8px;border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-tertiary);border:0.5px solid var(--color-border-tertiary)}
.tools-row{margin-top:8px;display:flex;gap:4px;flex-wrap:wrap}
.tool{font-size:10px;padding:1px 6px;border-radius:4px;background:var(--color-background-tertiary);color:var(--color-text-tertiary);font-family:var(--font-mono)}
.cnt{font-size:12px;color:var(--color-text-tertiary);margin-bottom:1rem}
</style>

<div class="wrap">
<div class="top">
  <div>
    <h2>Agent gallery — 25 powerful agents to add</h2>
    <p>All built on your existing tool_executor + LLM stack. Click any card to build it.</p>
  </div>
</div>

<div class="filters">
  <button class="fb on" onclick="fil('all',this)">All 25</button>
  <button class="fb" onclick="fil('productivity',this)">Productivity</button>
  <button class="fb" onclick="fil('devops',this)">DevOps</button>
  <button class="fb" onclick="fil('data',this)">Data & research</button>
  <button class="fb" onclick="fil('ops',this)">Operations</button>
  <button class="fb" onclick="fil('security',this)">Security</button>
</div>
<div class="cnt" id="cnt">Showing all 25 agents</div>
<div class="grid" id="grid"></div>
</div>

<script>

   name:'TranslatorAgent',role:'Multilingual Specialist',

   tools:['python_interpreter'],model:'claude-haiku',

let cur='all';
function fil(cat,btn){
  cur=cat;
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}
function render(){
  const items=cur==='all'?A:A.filter(a=>a.cat===cur);
  document.getElementById('cnt').textContent=`Showing ${items.length} agent${items.length!==1?'s':''}`;
  document.getElementById('grid').innerHTML=items.map(a=>`
    <div class="card${a.top?' top-pick':''}" onclick="sendPrompt(${JSON.stringify(a.prompt)})">
      <div class="ch">
        <div class="av ${a.av}" style="font-size:18px">${a.icon}</div>
        <div class="badges">
          <span class="badge ${a.badge}">${a.blabel}</span>
          ${a.top?'<span class="badge b-pow">Top pick</span>':''}
        </div>
      </div>
      <div class="ct">${a.name}</div>
      <div style="font-size:11px;color:var(--color-text-tertiary);margin-bottom:6px">${a.role}</div>
      <div class="cs">${a.desc}</div>
      <div class="meta">
        <span class="tag">${a.tag}</span>
        <span class="tag">${a.model}</span>
      </div>
      <div class="tools-row">${a.tools.map(t=>`<span class="tool">${t}</span>`).join('')}</div>
    </div>
  `).join('');
}
render();
</script>
