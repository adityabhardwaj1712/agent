<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentCore — Fleet Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app-root">
        <!-- Exact Mockup Sidebar -->
        <aside class="ms-sidebar">
            <div class="ms-logo">AC</div>
            <div class="ms-nav-icon act" data-screen="overview" title="Fleet Overview">
                <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="9" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="1" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="9" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/></svg>
            </div>
            <div class="ms-nav-icon" data-screen="registry" title="Agent Registry">
                <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="currentColor" stroke-width="1.5"/></svg>
            </div>
            <div class="ms-nav-icon" data-screen="workflow" title="Workflow Builder">
                <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><circle cx="3" cy="8" r="2" stroke="currentColor" stroke-width="1.5"/><circle cx="13" cy="4" r="2" stroke="currentColor" stroke-width="1.5"/><circle cx="13" cy="12" r="2" stroke="currentColor" stroke-width="1.5"/><path d="M5 8h3l2-4M8 8l2 4" stroke="currentColor" stroke-width="1.5"/></svg>
            </div>
            <div class="ms-nav-icon" data-screen="marketplace" title="Marketplace">
                <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M2 3h12l-1.5 7H3.5z" stroke="currentColor" stroke-width="1.5"/></svg>
            </div>
            <div class="ms-nav-icon" data-screen="analytics" title="Analytics">
                <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M2 14l4-5 3 3L13 5" stroke="currentColor" stroke-width="1.5"/></svg>
            </div>
            <div class="ms-nav-icon" data-screen="settings" title="Settings">
                <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.5"/><path d="M8 2v2M8 12v2M2 8h2M12 8h2" stroke="currentColor" stroke-width="1.5"/></svg>
            </div>
        </aside>

        <!-- Main Body -->
        <main class="ms-body">
            <header class="ms-topbar">
                <span class="ms-title" id="screen-title">Fleet Overview</span>
                <div style="display:flex;align-items:center;gap:6px">
                    <span class="ms-pulse"></span>
                    <span style="font-size:6px;font-weight:700;color:var(--s-accent2);letter-spacing:1px;">LIVE</span>
                </div>
            </header>

            <!-- Screen: Overview -->
            <section id="screen-overview" class="ms-content active">
                <div class="ms-stat-grid">
                    <div class="ms-stat">
                        <div class="ms-stat-lbl">Agents</div>
                        <div class="ms-stat-val" id="metric-agents" style="color:var(--s-accent)">0</div>
                        <svg class="ms-sparkline" viewBox="0 0 60 14"><path d="M0,10 C10,8 20,5 30,4 C40,3 50,2 60,1" stroke="rgba(79,142,255,.5)" stroke-width="1" fill="none"/></svg>
                    </div>
                    <div class="ms-stat">
                        <div class="ms-stat-lbl">Velocity</div>
                        <div class="ms-stat-val" id="metric-velocity" style="color:var(--s-accent2)">0k/s</div>
                        <svg class="ms-sparkline" viewBox="0 0 60 14"><path d="M0,8 C10,9 20,5 30,7 C40,9 50,3 60,4" stroke="rgba(0,229,160,.5)" stroke-width="1" fill="none"/></svg>
                    </div>
                    <div class="ms-stat">
                        <div class="ms-stat-lbl">Success</div>
                        <div class="ms-stat-val" id="metric-success" style="color:var(--s-accent2)">0%</div>
                        <svg class="ms-sparkline" viewBox="0 0 60 14"><path d="M0,2 L40,2 L45,10 L48,2 L60,2" stroke="rgba(0,229,160,.5)" stroke-width="1" fill="none"/></svg>
                    </div>
                </div>

                <div class="ms-card">
                    <div class="ms-card-title">ACP Live Feed</div>
                    <div class="ms-flow">
                        <div class="ms-node" style="border-color:rgba(255,107,74,.4)">
                            <div class="ms-node-ico" style="background:rgba(255,107,74,.15);color:var(--s-accent3)">A</div>
                            <div class="ms-node-nm">Claude-3.5</div>
                        </div>
                        <div class="ms-arrow"></div>
                        <div class="ms-node" style="border-color:rgba(245,166,35,.4)">
                            <div class="ms-node-ico" style="background:rgba(245,166,35,.15);color:var(--s-warn)">📄</div>
                            <div class="ms-node-nm">Task</div>
                        </div>
                        <div class="ms-arrow"></div>
                        <div class="ms-node" style="border-color:rgba(0,229,160,.4)">
                            <div class="ms-node-ico" style="background:rgba(0,229,160,.12);color:var(--s-accent2)">✦</div>
                            <div class="ms-node-nm">GPT-4o</div>
                        </div>
                    </div>
                </div>

                <div class="ms-card">
                    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
                        <div class="ms-card-title" style="margin-bottom:0">Incidents</div>
                        <span class="ms-badge ms-badge-d" style="font-size:5px;cursor:pointer">CIRCUIT BREAKER</span>
                    </div>
                    <table class="ms-tbl">
                        <thead>
                            <tr><th>Agent</th><th>Task</th><th>Status</th></tr>
                        </thead>
                        <tbody id="incident-tbody">
                            <!-- Dynamic Incidents -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Screen: Registry -->
            <section id="screen-registry" class="ms-content">
                <div style="font-size:8px;color:var(--s-text3);margin-bottom:8px">142 AGENTS REGISTERED</div>
                <div class="ms-agent-grid" id="agent-grid">
                    <!-- Dynamic Agents -->
                </div>
            </section>

            <!-- Screens: Placeholders -->
            <section id="screen-workflow" class="ms-content"><div class="ms-title">Workflow Builder Coming Soon</div></section>
            <section id="screen-marketplace" class="ms-content"><div class="ms-title">Marketplace Coming Soon</div></section>
            <section id="screen-analytics" class="ms-content"><div class="ms-title">Analytics Dashboard Coming Soon</div></section>
            <section id="screen-settings" class="ms-content"><div class="ms-title">Global Settings</div></section>
        </main>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000/v1';

        // Navigation
        document.querySelectorAll('.ms-nav-icon').forEach(icon => {
            icon.addEventListener('click', () => {
                const target = icon.getAttribute('data-screen');
                document.querySelectorAll('.ms-nav-icon').forEach(i => i.classList.remove('act'));
                icon.classList.add('act');
                document.querySelectorAll('.ms-content').forEach(s => s.classList.remove('active'));
                document.getElementById('screen-' + target).classList.add('active');
                document.getElementById('screen-title').textContent = icon.getAttribute('title');
            });
        });

        // Real-time Metrics
        async function fetchMetrics() {
            try {
                const res = await fetch(`${API_BASE}/analytics/metrics`);
                const data = await res.json();
                document.getElementById('metric-agents').textContent = data.active_agents;
                document.getElementById('metric-velocity').textContent = (data.tasks_last_24h / 3600).toFixed(1) + 'k/s';
                document.getElementById('metric-success').textContent = data.success_rate;
            } catch (e) {
                console.error("Metrics sync failure", e);
            }
        }

        // Mock Registry Data & incidents (In real app, fetch from backend)
        const mockAgents = [
            { id: 'ag_01', name: 'Claude-3.5', status: 'Online', success: '99.9%', latency: '142ms', color: '#ff6b4a' },
            { id: 'ag_02', name: 'GPT-4o', status: 'Online', success: '99.7%', latency: '190ms', color: '#4f8eff' },
            { id: 'ag_03', name: 'Gemini Pro', status: 'Throttled', success: '97.2%', latency: '310ms', color: '#c084fc' },
            { id: 'ag_04', name: 'Mistral Large', status: 'Online', success: '99.5%', latency: '88ms', color: '#00e5a0' }
        ];

        function renderRegistry() {
            const grid = document.getElementById('agent-grid');
            grid.innerHTML = mockAgents.map(a => `
                <div class="ms-agent-card">
                    <div class="ms-agent-header">
                        <div class="ms-avatar" style="background:rgba(255,255,255,0.05);border:1px solid var(--s-border2);color:${a.color}">${a.name[0]}</div>
                        <div>
                            <div style="font-size:7px;font-weight:600;">${a.name}</div>
                            <div style="font-size:5px;color:var(--s-text3);font-family:'JetBrains Mono'">${a.id}</div>
                        </div>
                        <span class="ms-badge ${a.status === 'Online' ? 'ms-badge-s' : 'ms-badge-w'}" style="margin-left:auto;font-size:4px">${a.status}</span>
                    </div>
                    <div class="ms-agent-stats">
                        <div class="ms-astat">
                            <div class="ms-astat-l">Success</div>
                            <div class="ms-astat-v" style="color:var(--s-accent2)">${a.success}</div>
                        </div>
                        <div class="ms-astat">
                            <div class="ms-astat-l">Latency</div>
                            <div class="ms-astat-v">${a.latency}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderIncidents() {
            const tbody = document.getElementById('incident-tbody');
            tbody.innerHTML = `
                <tr><td><span style="width:4px;height:4px;border-radius:50%;background:var(--s-danger);display:inline-block;margin-right:4px"></span>Claude-3.5</td><td>Analyze Doc</td><td><span class="ms-badge ms-badge-d">Removed</span></td></tr>
                <tr><td><span style="width:4px;height:4px;border-radius:50%;background:var(--s-danger);display:inline-block;margin-right:4px"></span>GPT-4o</td><td>Analyze Doc</td><td><span class="ms-badge ms-badge-d">Removed</span></td></tr>
            `;
        }

        // Init
        fetchMetrics();
        renderRegistry();
        renderIncidents();
        setInterval(fetchMetrics, 5000);
    </script>
</body>
</html>
