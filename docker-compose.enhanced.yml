version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: agentcloud-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentcloud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentcloud}
      POSTGRES_DB: ${POSTGRES_DB:-agentcloud}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentcloud"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentcloud-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: agentcloud-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentcloud-network

networks:
  agentcloud-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
