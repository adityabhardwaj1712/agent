
services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/agentcloud
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-secret-key-change-me}
      - CORS_ORIGINS=http://localhost:3000,http://frontend:3000,http://localhost:8000
      - RUN_MIGRATIONS=true
      - DEPLOYMENT_MODE=local
      - DEPLOYMENT_REGION=us-east-1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request, json; resp = urllib.request.urlopen('http://localhost:8000/').read(); status = json.loads(resp); exit(0 if status['status'] == 'running' else 1)\""]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 30s

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - .:/app
    command: sh -c "sleep 10 && PYTHONPATH=/app python -m app.workers.agent_worker"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/agentcloud
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
      - SECRET_KEY=${SECRET_KEY:-secret-key-change-me}
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: agentcloud
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
      - API_BASE_URL=http://api:8000


    depends_on:
      api:
        condition: service_healthy

  smoke:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - .:/app
    command: python scripts/smoke.py
    env_file:
      - .env
    environment:
      - API_BASE_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  doctor:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - .:/app
    command: python scripts/doctor.py --fix
    env_file:
      - .env
    environment:
      - API_BASE_URL=http://api:8000
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/agentcloud
    depends_on:
      api:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
